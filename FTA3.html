<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d1117;font-family:'Courier New',monospace;padding:16px}
svg{display:block;margin:0 auto}
.top{fill:#c0392b}.mid{fill:#1a252f;stroke-width:1.5}
.leaf-mfg{fill:#0d2b1a;stroke:#27ae60;stroke-width:1}
.leaf-ext{fill:#2b1a0d;stroke:#e67e22;stroke-width:1}
.leaf-ctl{fill:#1a0d2b;stroke:#8e44ad;stroke-width:1}
.or{fill:#e67e22}.and{fill:#2980b9}
.line{stroke:#445;stroke-width:1;fill:none}
text{font-family:'Courier New',monospace}
</style>
</head>
<body>
<svg viewBox="0 0 860 640" width="860" height="640">
<!-- SPEED LABELS -->
<rect x="10" y="8" width="420" height="22" rx="2" fill="#1a2a1a" stroke="#27ae60"/>
<text x="220" y="22" text-anchor="middle" fill="#2ecc71" font-size="10" font-weight="bold">100 km/h</text>
<rect x="440" y="8" width="410" height="22" rx="2" fill="#2a1a1a" stroke="#e74c3c"/>
<text x="645" y="22" text-anchor="middle" fill="#e74c3c" font-size="10" font-weight="bold">120 km/h</text>
<!-- TOP -->
<rect x="280" y="38" width="300" height="34" rx="3" class="top"/>
<text x="430" y="53" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">10〜20Hz 車室内振動</text>
<text x="430" y="67" text-anchor="middle" fill="#faa" font-size="8">シリーズHEV 巡航時 [トップ事象]</text>
<!-- OR gate -->
<polygon points="430,80 417,98 443,98" class="or"/>
<text x="430" y="93" text-anchor="middle" fill="#fff" font-size="8">OR</text>
<line x1="430" y1="72" x2="430" y2="80" class="line"/>
<line x1="430" y1="98" x2="430" y2="110" class="line"/>
<line x1="155" y1="110" x2="705" y2="110" class="line"/>
<line x1="155" y1="110" x2="155" y2="128" class="line"/>
<line x1="430" y1="110" x2="430" y2="128" class="line"/>
<line x1="705" y1="110" x2="705" y2="128" class="line"/>
<!-- BRANCH 1: WH -->
<rect x="68" y="128" width="174" height="34" rx="3" class="mid" stroke="#3498db"/>
<text x="155" y="143" text-anchor="middle" fill="#7ec8e3" font-size="10">ホイールホップ共振</text>
<text x="155" y="157" text-anchor="middle" fill="#888" font-size="8">12〜14Hz（独立懸架）</text>
<line x1="155" y1="162" x2="155" y2="176" class="line"/>
<rect x="143" y="176" width="24" height="14" rx="2" class="and"/>
<text x="155" y="187" text-anchor="middle" fill="#fff" font-size="8">AND</text>
<line x1="155" y1="190" x2="155" y2="202" class="line"/>
<line x1="95" y1="202" x2="215" y2="202" class="line"/>
<line x1="95" y1="202" x2="95" y2="216" class="line"/>
<line x1="215" y1="202" x2="215" y2="216" class="line"/>
<rect x="38" y="216" width="114" height="42" rx="2" class="leaf-mfg"/>
<text x="95" y="231" text-anchor="middle" fill="#2ecc71" font-size="9">ばね下質量</text>
<text x="95" y="243" text-anchor="middle" fill="#888" font-size="8">20〜27kg/輪</text>
<text x="95" y="253" text-anchor="middle" fill="#aaa" font-size="7">製造ばらつき</text>
<rect x="158" y="216" width="114" height="42" rx="2" class="leaf-mfg"/>
<text x="215" y="231" text-anchor="middle" fill="#2ecc71" font-size="9">タイヤ縦剛性</text>
<text x="215" y="243" text-anchor="middle" fill="#888" font-size="8">140〜200kN/m</text>
<text x="215" y="253" text-anchor="middle" fill="#aaa" font-size="7">±10〜15%</text>
<!-- WH note -->
<rect x="38" y="270" width="234" height="54" rx="2" fill="#0d1a2a" stroke="#3498db" stroke-width="0.8"/>
<text x="155" y="284" text-anchor="middle" fill="#7ec8e3" font-size="8" font-weight="bold">R1H vs ホイールホップ差</text>
<text x="155" y="296" text-anchor="middle" fill="#2ecc71" font-size="8">100km/h: R1H=16.0Hz 差2〜4Hz 近傍励起</text>
<text x="155" y="307" text-anchor="middle" fill="#888" font-size="7.5">  → 共振ではないが帯域内で増幅</text>
<text x="155" y="318" text-anchor="middle" fill="#e74c3c" font-size="8">120km/h: R1H=19.2Hz 差5〜7Hz 離脱</text>
<text x="155" y="329" text-anchor="middle" fill="#888" font-size="7.5">  → 励起さらに低下</text>
<!-- BRANCH 2: EGU -->
<rect x="330" y="128" width="200" height="34" rx="3" class="mid" stroke="#e67e22"/>
<text x="430" y="143" text-anchor="middle" fill="#f0a500" font-size="10">EGUマウント剛体共振</text>
<text x="430" y="157" text-anchor="middle" fill="#888" font-size="8">9〜10Hz（常在モード）</text>
<line x1="430" y1="162" x2="430" y2="176" class="line"/>
<polygon points="430,176 417,194 443,194" class="or"/>
<text x="430" y="189" text-anchor="middle" fill="#fff" font-size="8">OR</text>
<line x1="430" y1="194" x2="430" y2="206" class="line"/>
<line x1="325" y1="206" x2="535" y2="206" class="line"/>
<line x1="325" y1="206" x2="325" y2="216" class="line"/>
<line x1="430" y1="206" x2="430" y2="216" class="line"/>
<line x1="535" y1="206" x2="535" y2="216" class="line"/>
<rect x="268" y="216" width="114" height="42" rx="2" class="leaf-mfg"/>
<text x="325" y="231" text-anchor="middle" fill="#2ecc71" font-size="9">マウントゴム剛性</text>
<text x="325" y="243" text-anchor="middle" fill="#888" font-size="8">±20%+温度</text>
<text x="325" y="253" text-anchor="middle" fill="#aaa" font-size="7">速度非依存</text>
<rect x="373" y="216" width="114" height="42" rx="2" class="leaf-mfg"/>
<text x="430" y="231" text-anchor="middle" fill="#2ecc71" font-size="9">EGU質量</text>
<text x="430" y="243" text-anchor="middle" fill="#888" font-size="8">65〜150kg</text>
<text x="430" y="253" text-anchor="middle" fill="#aaa" font-size="7">速度非依存</text>
<rect x="478" y="216" width="114" height="42" rx="2" class="leaf-ext"/>
<text x="535" y="228" text-anchor="middle" fill="#e67e22" font-size="9">路面うねり加振</text>
<text x="535" y="240" text-anchor="middle" fill="#2ecc71" font-size="8">100: λ≈2.9m 頻度↑</text>
<text x="535" y="252" text-anchor="middle" fill="#e74c3c" font-size="8">120: λ≈3.5m 頻度↓</text>
<!-- EGU note -->
<rect x="268" y="270" width="324" height="54" rx="2" fill="#1a1200" stroke="#f39c12" stroke-width="0.8"/>
<text x="430" y="284" text-anchor="middle" fill="#f1c40f" font-size="8" font-weight="bold">9〜10Hz加振に必要な路面波長</text>
<text x="430" y="296" text-anchor="middle" fill="#2ecc71" font-size="8">100km/h: λ=2.9m → 一般道舗装継目に多い</text>
<text x="430" y="308" text-anchor="middle" fill="#e74c3c" font-size="8">120km/h: λ=3.5m → 長波長うねり（高速道橋梁）</text>
<text x="430" y="319" text-anchor="middle" fill="#888" font-size="7.5">  モード自体は常時存在。加振頻度が下がるだけ</text>
<text x="430" y="329" text-anchor="middle" fill="#888" font-size="7.5">  ゴム剛性ばらつきによる個体差は速度依存なし</text>
<!-- BRANCH 3: ねじり -->
<rect x="610" y="128" width="190" height="34" rx="3" class="mid" stroke="#8e44ad"/>
<text x="705" y="143" text-anchor="middle" fill="#c39bd3" font-size="10">駆動系ねじり共振</text>
<text x="705" y="157" text-anchor="middle" fill="#888" font-size="8">8〜15Hz（過渡励起）</text>
<line x1="705" y1="162" x2="705" y2="176" class="line"/>
<polygon points="705,176 692,194 718,194" fill="#8e44ad"/>
<text x="705" y="189" text-anchor="middle" fill="#fff" font-size="8">OR</text>
<line x1="705" y1="194" x2="705" y2="206" class="line"/>
<line x1="635" y1="206" x2="775" y2="206" class="line"/>
<line x1="635" y1="206" x2="635" y2="216" class="line"/>
<line x1="775" y1="206" x2="775" y2="216" class="line"/>
<rect x="572" y="216" width="126" height="42" rx="2" class="leaf-ctl"/>
<text x="635" y="231" text-anchor="middle" fill="#a29bfe" font-size="9">モータートルク変動</text>
<text x="635" y="243" text-anchor="middle" fill="#888" font-size="8">回生切替・急加速</text>
<text x="635" y="253" text-anchor="middle" fill="#aaa" font-size="7">速度依存なし</text>
<rect x="712" y="216" width="126" height="42" rx="2" class="leaf-ctl"/>
<text x="775" y="228" text-anchor="middle" fill="#a29bfe" font-size="9">エンジン始動過渡</text>
<text x="775" y="240" text-anchor="middle" fill="#888" font-size="8">0.5次@1140rpm</text>
<text x="775" y="252" text-anchor="middle" fill="#aaa" font-size="7">速度依存なし</text>
<!-- ねじり note -->
<rect x="572" y="270" width="266" height="54" rx="2" fill="#1a0d2b" stroke="#8e44ad" stroke-width="0.8"/>
<text x="705" y="284" text-anchor="middle" fill="#c39bd3" font-size="8" font-weight="bold">過渡励起：速度に依存しない</text>
<text x="705" y="296" text-anchor="middle" fill="#2ecc71" font-size="8">100km/h: エンジン始動頻度 中〜高</text>
<text x="705" y="308" text-anchor="middle" fill="#e74c3c" font-size="8">120km/h: 連続発電 → 始動頻度↓</text>
<text x="705" y="319" text-anchor="middle" fill="#888" font-size="7.5">  ただし回生頻度↑ → トルク変動↑で相殺</text>
<text x="705" y="329" text-anchor="middle" fill="#888" font-size="7.5">  結果：100km/hとほぼ同等</text>
<!-- SUMMARY -->
<rect x="10" y="340" width="840" height="160" rx="3" fill="#0a0e15" stroke="#333"/>
<text x="430" y="358" text-anchor="middle" fill="#aaa" font-size="10" font-weight="bold">速度別リスク比較</text>
<line x1="10" y1="364" x2="850" y2="364" stroke="#333"/>
<text x="90" y="377" text-anchor="middle" fill="#666" font-size="8">メカニズム</text>
<text x="310" y="377" text-anchor="middle" fill="#2ecc71" font-size="8">100km/h</text>
<text x="490" y="377" text-anchor="middle" fill="#e74c3c" font-size="8">120km/h</text>
<text x="680" y="377" text-anchor="middle" fill="#aaa" font-size="8">変化の理由</text>
<line x1="10" y1="381" x2="850" y2="381" stroke="#333"/>
<text x="25" y="394" fill="#7ec8e3" font-size="8">ホイールホップ（12〜14Hz）</text>
<text x="310" y="394" text-anchor="middle" fill="#f1c40f" font-size="9">★★★★☆</text>
<text x="490" y="394" text-anchor="middle" fill="#e67e22" font-size="9">★★★☆☆</text>
<text x="540" y="394" fill="#666" font-size="7.5">R1H 16→19.2Hz、共振からさらに離脱</text>
<text x="25" y="410" fill="#f0a500" font-size="8">EGUマウント共振（9〜10Hz）</text>
<text x="310" y="410" text-anchor="middle" fill="#e67e22" font-size="9">★★★☆☆</text>
<text x="490" y="410" text-anchor="middle" fill="#3498db" font-size="9">★★☆☆☆</text>
<text x="540" y="410" fill="#666" font-size="7.5">路面λ=3.5m必要、頻度↓。モードは常在</text>
<text x="25" y="426" fill="#c39bd3" font-size="8">駆動系ねじり共振（8〜15Hz）</text>
<text x="310" y="426" text-anchor="middle" fill="#e67e22" font-size="9">★★★☆☆</text>
<text x="490" y="426" text-anchor="middle" fill="#e67e22" font-size="9">★★★☆☆</text>
<text x="540" y="426" fill="#666" font-size="7.5">過渡励起は速度非依存。始動↓/回生↑で相殺</text>
<line x1="10" y1="432" x2="850" y2="432" stroke="#333"/>
<text x="25" y="446" fill="#fff" font-size="8" font-weight="bold">総合</text>
<text x="310" y="446" text-anchor="middle" fill="#f1c40f" font-size="9" font-weight="bold">★★★★☆ 高</text>
<text x="490" y="446" text-anchor="middle" fill="#e67e22" font-size="9" font-weight="bold">★★★☆☆ 中</text>
<text x="540" y="446" fill="#aaa" font-size="7.5">120km/hの方が全体的にリスク低い</text>
<text x="25" y="464" fill="#666" font-size="8">⚠ 120km/hで問題が残る場合：長波長路面うねり×EGUマウント共振（高速道路橋梁・凍結補修路面）</text>
<text x="25" y="478" fill="#666" font-size="8">⚠ 軽自動車の最悪点は60km/h（R1H=9.6Hz直撃）。100〜120km/hではリスク低下が顕著。</text>
<text x="25" y="492" fill="#666" font-size="8">⚠ 100km/hのホイールホップ問題は「共振一致」ではなく「共振近傍での持続増幅」。一般乗用車（WH=11〜13Hz）の方が深刻。</text>
<!-- LEGEND -->
<rect x="10" y="512" width="840" height="26" rx="2" fill="#0a0e15" stroke="#222"/>
<polygon points="50,524 41,536 59,536" class="or"/>
<text x="67" y="534" fill="#aaa" font-size="8">OR</text>
<rect x="100" y="522" width="18" height="12" rx="2" class="and"/>
<text x="125" y="532" fill="#aaa" font-size="8">AND</text>
<rect x="170" y="523" width="10" height="10" rx="1" class="leaf-mfg"/>
<text x="186" y="532" fill="#aaa" font-size="8">製造ばらつき</text>
<rect x="265" y="523" width="10" height="10" rx="1" class="leaf-ext"/>
<text x="281" y="532" fill="#aaa" font-size="8">外部入力</text>
<rect x="355" y="523" width="10" height="10" rx="1" class="leaf-ctl"/>
<text x="371" y="532" fill="#aaa" font-size="8">制御・過渡</text>
<text x="455" y="532" fill="#555" font-size="8">R1H(155/65R14): 100km/h=16.0Hz / 120km/h=19.2Hz  |  路面λ(9.5Hz): 100km/h=2.9m / 120km/h=3.5m</text>
</svg>
</body>
</html>
